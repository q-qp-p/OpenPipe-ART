name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without the leading v"
        required: true
        type: string
      artifact_run_id:
        description: "Optional workflow run ID containing the python-distributions artifact"
        required: false
        type: string

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build package
        run: python scripts/build_package.py

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  runtime-smoke:
    runs-on: art-large-runner
    needs: build-package
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Smoke test managed vLLM runtime install
        run: |
          export ART_VLLM_RUNTIME_CACHE_DIR="${RUNNER_TEMP}/art-vllm-runtime-cache"
          export UV_LINK_MODE=copy
          wheel_path="$(python - <<'PY'
          from pathlib import Path

          print(next(Path("dist").glob("openpipe_art-*.whl")).resolve())
          PY
          )"

          project_dir="$(mktemp -d)"
          cd "$project_dir"
          uv init --name art-runtime-smoke --python 3.12 --bare
          uv add "openpipe-art[backend] @ file://${wheel_path}"
          uv sync
          uv run python - <<'PY'
          from pathlib import Path
          import subprocess

          from art.vllm_runtime import ensure_vllm_runtime

          runtime_bin = ensure_vllm_runtime()
          runtime_python = Path(runtime_bin).parent / "python"
          subprocess.run([str(runtime_bin), "--help"], check=True)
          subprocess.run(
              [
                  str(runtime_python),
                  "-c",
                  "import art_vllm_runtime, torch, vllm; print('runtime imports ok')",
              ],
              check=True,
          )
          print(runtime_bin)
          PY

  publish:
    runs-on: ubuntu-latest
    needs: [build-package, runtime-smoke]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Create git tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag v${{ needs.build-package.outputs.version }}
          git push origin v${{ needs.build-package.outputs.version }}

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v${{ needs.build-package.outputs.version }} --json isDraft | jq -r '.isDraft' | grep -q true; then
            gh release edit v${{ needs.build-package.outputs.version }} --draft=false
          else
            echo "::error::No draft release found for v${{ needs.build-package.outputs.version }}"
            exit 1
          fi

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v${{ needs.build-package.outputs.version }} dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  manual-pypi-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: inputs.artifact_run_id == ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        if: inputs.artifact_run_id == ''
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build package
        if: inputs.artifact_run_id == ''
        run: python scripts/build_package.py

      - name: Download package artifact
        if: inputs.artifact_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
          run-id: ${{ inputs.artifact_run_id }}
          github-token: ${{ github.token }}

      - name: Verify package version
        run: |
          test -f "dist/openpipe_art-${{ inputs.version }}-py3-none-any.whl"
          test -f "dist/openpipe_art-${{ inputs.version }}.tar.gz"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
